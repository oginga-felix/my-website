      <h2>Login to View our website content</h2>
      <form id="loginForm">
      <label for="username">email or phone number:</label>
      <input type="text" id="username" name="username" required><br><br>
  
      <label for="password">Password:</label>
      <input type="password" id="password" name="password" required><br><br>
      <a href="index2.html"><button>log in</a></button>
        <p id="message"></p>
        <script>
      // script.js

document.addEventListener('DOMContentLoaded', () => {
    const loginForm = document.getElementById('loginForm');
    const messageElement = document.getElementById('message');

    // Define correct credentials (for this client-side example)
    const CORRECT_USERNAME = 'test@example.com';
    const CORRECT_PASSWORD = 'password123';
    const NEXT_PAGE_URL = 'next-page.html'; // <<< CHANGE THIS TO YOUR ACTUAL NEXT PAGE FILE NAME

    if (loginForm) {
        // 1. Listen for the form submission event
        loginForm.addEventListener('submit', (event) => {
            // 2. Prevent the default form submission (which reloads the page)
            event.preventDefault();

            // 3. Get the input values
            const usernameInput = document.getElementById('username').value;
            const passwordInput = document.getElementById('password').value;

            // 4. Validate the credentials
            if (usernameInput === CORRECT_USERNAME && passwordInput === CORRECT_PASSWORD) {
                // Successful Login
                messageElement.style.color = 'green';
                messageElement.textContent = 'Login successful! Redirecting...';

                // 5. Redirect to the next page
                // We use a small delay for the user to see the success message
                setTimeout(() => {
                    window.location.href = NEXT_PAGE_URL;
                }, 1000); // Redirect after 1 second

            } else {
                // Failed Login
                messageElement.style.color = 'red';
                messageElement.textContent = 'Invalid username or password.';
            }

            // 6. Clear password field for security on failure
            if (usernameInput !== CORRECT_USERNAME || passwordInput !== CORRECT_PASSWORD) {
                 document.getElementById('password').value = '';
            }
        });
    }
});
</script>
